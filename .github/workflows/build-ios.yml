name: Build iOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add iOS Rust targets
        run: rustup target add aarch64-apple-ios x86_64-apple-ios aarch64-apple-ios-sim

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Xcode Command Line Tools
        run: xcode-select --install || true

      - name: Create local.yaml
        run: cp src-tauri/configuration/production.yaml src-tauri/configuration/local.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Init Tauri iOS
        run: pnpm tauri ios init

      - name: Build iOS (no signing)
        run: pnpm tauri ios build --export-method debugging

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: |
            src-tauri/gen/apple/build/arm64/*.ipa
            src-tauri/gen/apple/build/**/*.ipa
          if-no-files-found: warn

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/gen/apple/build/**/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
